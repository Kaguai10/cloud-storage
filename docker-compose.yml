version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - cloudnet

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - cloudnet

  api:
    build: ./api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cloudnet

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cloudnet

  startup-info:
    image: alpine:latest
    container_name: cloud-storage2-info
    depends_on:
      - api
      - frontend
      - backend
    volumes:
      - ./scripts:/scripts
    command: sh -c "chmod +x /scripts/startup-info.sh && /scripts/startup-info.sh"
    networks:
      - cloudnet

volumes:
  postgres_data:
  minio_data:

networks:
  cloudnet:
    driver: bridge
