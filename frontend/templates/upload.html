{% extends "base.html" %}

{% block title %}Upload File{% endblock %}

{% block content %}
<h2><i class="bi bi-cloud-upload"></i> Upload File</h2>

<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="uploadForm">
                    <!-- Drag & Drop Area -->
                    <div class="upload-area mb-4" id="dropArea">
                        <i class="bi bi-cloud-upload display-1 text-muted"></i>
                        <h5 class="mt-3">Drag & Drop your image here</h5>
                        <p class="text-muted">or click to browse</p>
                        <p class="text-muted small">Supported: PNG, JPG, JPEG, GIF, WEBP, BMP (Max 50MB)</p>
                        <input type="file" id="fileInput" name="file" accept="image/*" hidden required>
                    </div>
                    
                    <!-- Preview -->
                    <div id="previewContainer" class="mb-3 text-center" style="display: none;">
                        <img id="preview" class="img-thumbnail" style="max-height: 200px;" alt="Preview">
                        <p id="fileName" class="mt-2 text-muted"></p>
                        <p id="fileSize" class="small text-muted"></p>
                    </div>
                    
                    <div class="mb-3">
                        <label for="filename" class="form-label">File Name *</label>
                        <input type="text" class="form-control" id="filename" name="filename" required placeholder="Enter file name">
                    </div>
                    
                    <div class="mb-3">
                        <label for="category" class="form-label">Category *</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select category...</option>
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="family">Family</option>
                            <option value="travel">Travel</option>
                            <option value="nature">Nature</option>
                            <option value="art">Art</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Visibility *</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="visibility" 
                                   id="visibility_private" value="private" checked>
                            <label class="form-check-label" for="visibility_private">
                                <i class="bi bi-lock"></i> Private - Only you can see
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="visibility" 
                                   id="visibility_public" value="public">
                            <label class="form-check-label" for="visibility_public">
                                <i class="bi bi-globe"></i> Public - Everyone can see and download
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="visibility" 
                                   id="visibility_semipublic" value="semipublic">
                            <label class="form-check-label" for="visibility_semipublic">
                                <i class="bi bi-people"></i> Semi-Public - Only people you share with can see
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <i class="bi bi-cloud-upload"></i> Upload
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const dropArea = document.getElementById('dropArea');
const fileInput = document.getElementById('fileInput');
const previewContainer = document.getElementById('previewContainer');
const preview = document.getElementById('preview');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const submitBtn = document.getElementById('submitBtn');

// Click to upload
dropArea.addEventListener('click', () => fileInput.click());

// File input change
fileInput.addEventListener('change', handleFile);

// Drag & drop events
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
}

['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
});

['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
});

dropArea.addEventListener('drop', handleDrop, false);

function handleDrop(e) {
    const dt = e.dataTransfer;
    const files = dt.files;
    if (files.length) {
        fileInput.files = files;
        handleFile();
    }
}

function handleFile() {
    const file = fileInput.files[0];
    if (file) {
        // Check file type
        const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/gif', 'image/webp', 'image/bmp'];
        if (!validTypes.includes(file.type)) {
            alert('Invalid file type! Please upload PNG, JPG, JPEG, GIF, WEBP, or BMP images only.');
            fileInput.value = '';
            return;
        }
        
        // Check file size (50MB)
        if (file.size > 50 * 1024 * 1024) {
            alert('File too large! Maximum size is 50MB.');
            fileInput.value = '';
            return;
        }
        
        fileName.textContent = file.name;
        fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
        
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            previewContainer.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

// Disable submit button during upload
document.getElementById('uploadForm').addEventListener('submit', function() {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Uploading...';
});
</script>
{% endblock %}
